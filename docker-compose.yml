version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: st6_weekly_commit
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "8081:8081"
    environment:
      DB_URL: jdbc:postgresql://db:5432/st6_weekly_commit
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: st6-weekly-commit-secret-key-for-jwt-tokens-must-be-256-bits-long
      PORT: 8081
      CORS_ORIGINS: http://localhost:5005,http://localhost:5173,http://localhost:3000
    depends_on:
      - db

  frontend:
    build: ./frontend
    ports:
      - "5005:5005"
    environment:
      VITE_API_URL: http://localhost:8081
    depends_on:
      - backend

volumes:
  pgdata:
