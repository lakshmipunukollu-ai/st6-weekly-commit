spring.application.name=st6-weekly-commit

# Database
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/st6_weekly_commit}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

# JWT
jwt.secret=${JWT_SECRET:st6-weekly-commit-secret-key-for-jwt-tokens-must-be-256-bits-long}
jwt.expiration=86400000

# Actuator
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always

# Server
server.port=${PORT:8080}

# CORS
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}
